version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: secure-task-manager-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: secure_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secure_task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: secure-task-manager-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: secure-task-manager-adminer
    restart: unless-stopped

    ports:
      - "8081:8080"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: