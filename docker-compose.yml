version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-task-manager-app
    restart: unless-stopped

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/secure_task_manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: secure-task-manager-demo-jwt-secret-key-2026-please-change
      APP_JWT_EXPIRATION_MS: 3600000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: secure-task-manager-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: secure_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secure_task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: secure-task-manager-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: secure-task-manager-adminer
    restart: unless-stopped

    ports:
      - "8081:8080"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
